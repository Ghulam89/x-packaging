<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- iOS Safari specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Removed external Google Fonts to avoid woff2 on critical path. Using system font fallbacks via App.css -->
    <!-- Performance optimizations: Preconnect to external domains -->
    <link rel="preconnect" href="https://xcustompackaging.com" crossorigin />
    <link rel="dns-prefetch" href="https://xcustompackaging.com" />
    <link rel="preload" as="font" href="/src/assets/fonts/Inter-Regular.otf" type="font/otf" crossorigin>
    <link rel="preload" as="font" href="/src/assets/fonts/Inter-SemiBold.otf" type="font/otf" crossorigin>
    <link rel="preload" as="font" href="/src/assets/fonts/Inter-Bold.otf" type="font/otf" crossorigin>
    <link rel="preload" as="video" href="/src/assets/videos/hero.mp4" type="video/mp4" fetchpriority="high" />
    <link rel="modulepreload" href="/src/entry-client.jsx" />
    <!--app-head-->
    <script type="module" src="/src/entry-client.jsx"></script>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <!--server-data-->
    <!-- Moved to head for faster hydration -->
  </body>
</html>
